<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>FIXIFY - Register</title>
    <style>
        body {
            /* Using background image */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('http://googleusercontent.com/image_generation_content/0');
            background-image: url("{{ url_for('static', filename='image/Fixify_logo.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            opacity: 1.00;
            z-index: -99;
        }
        .register-container {
            max-width: 450px;
            margin-top: 8vh;
            padding: 2rem;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            /* Merged styles for a clean, transparent effect */
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mx-auto register-container">
            <div class="text-center mb-4">
                <img src="assets/image/FIXIFY_LOGO1.png" alt="Fixify Logo" width="100">
            </div>

            <h2 class="text-center mb-4">Create Your Fixify Account</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}" role="alert">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="mb-3">
                    <label for="nameInput" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="nameInput" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label for="emailInput" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="emailInput" name="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label for="passwordInput" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Create a password" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('passwordInput', this)">👁️</button>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="confirmPasswordInput" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirmPasswordInput" placeholder="Confirm your password" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPasswordInput', this)">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>

            <div class="text-center mt-3">
                <span>Already have an account? </span><a href="{{ url_for('login') }}">Sign In</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/register.js') }}"></script>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                btn.innerText = "🙈"; // Change icon to 'Hide'
            } else {
                input.type = "password";
                btn.innerText = "👁️"; // Change icon to 'Show'
            }
        }
    </script>
</body>
</html>

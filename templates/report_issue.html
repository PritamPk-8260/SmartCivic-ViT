<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>FIXIFY - Report an Issue</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">Fixify Dashboard</a>
            <div class="ms-auto">
                <a class="nav-link text-white" href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Report a New Civic Issue</h2>
        <p>Take a photo, describe it, and we will handle the rest.</p>

        <form method="POST" action="{{ url_for('report_issue') }}" enctype="multipart/form-data">
            
            <div class="mb-3">
                <label for="photo" class="form-label">Upload a Photo</label>
                <input class="form-control" type="file" id="photo" name="photo" accept="image/*" capture="environment" required>
                <div class="form-text">Tap to take a photo or select from gallery.</div>
            </div>

            <div class="mb-3">
                <label for="location" class="form-label">Location / Address</label>
                <input type="text" class="form-control" id="location" name="location" placeholder="e.g., Near City Park, Gandhinagar" required>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3" placeholder="Describe the problem in detail." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Submit Report</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
